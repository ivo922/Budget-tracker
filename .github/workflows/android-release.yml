name: Android release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci
      - run: npm test

      - name: Verify app.json version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          TAG="${GITHUB_REF_NAME#v}"
          test "$VERSION" = "$TAG" || {
            echo "::error::app.json version ($VERSION) must match tag (${GITHUB_REF_NAME})"
            exit 1
          }

      - name: EAS build
        run: |
          eas build -p android --profile preview --non-interactive --wait --json > build.json
          node - <<'NODE' >> "$GITHUB_ENV"
          const build = JSON.parse(require('fs').readFileSync('build.json', 'utf8'));
          const row = Array.isArray(build) ? build[0] : build;
          const url = row?.artifacts?.buildUrl ?? row?.artifacts?.applicationArchiveUrl;
          if (!url) {
            console.error('No APK URL in build output:', row);
            process.exit(1);
          }
          console.log(`APK_URL=${url}`);
          NODE

      - name: Download APK
        run: curl -L -o budget-tracker.apk "$APK_URL"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" budget-tracker.apk \
            --title "Budget Tracker ${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Upload APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: budget-tracker-apk
          path: budget-tracker.apk
